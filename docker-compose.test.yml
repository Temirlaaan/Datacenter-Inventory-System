# Local Postgres for integration tests and `alembic upgrade head` smoke checks.
# This is NOT the production stack — that lives in docker-compose.yml (Task 7).

services:
  dcinv-test-db:
    image: postgres:15
    container_name: dcinv-test-db
    environment:
      POSTGRES_DB: dcinv_test
      POSTGRES_USER: dcinv_test
      POSTGRES_PASSWORD: dcinv_test
    ports:
      - "5433:5432"  # 5433 to avoid clashing with a host-installed Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcinv_test -d dcinv_test"]
      interval: 1s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data  # fresh DB on every up — no persistence needed for tests
