# Minimal nginx reverse-proxy config for the DC Inventory backend.
# Drop this in /etc/nginx/sites-available/qr.dc.t-cloud.kz and
# `ln -s` it into sites-enabled.
#
# Assumes:
#   - TLS certs at /etc/letsencrypt/live/qr.dc.t-cloud.kz/ (certbot/acme)
#   - Backend container exposes 8000 on the host loopback
#   - DNS for qr.dc.t-cloud.kz resolves to 10.121.253.14

server {
    listen 80;
    listen [::]:80;
    server_name qr.dc.t-cloud.kz;
    # Redirect everything to HTTPS; certbot's --http-01 challenge writes
    # under /.well-known/acme-challenge/ before the redirect kicks in.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qr.dc.t-cloud.kz;

    ssl_certificate     /etc/letsencrypt/live/qr.dc.t-cloud.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qr.dc.t-cloud.kz/privkey.pem;
    # Modern TLS-only; drop TLSv1, TLSv1.1.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # PDF labels download can be a few MB; bump the body / response budgets.
    client_max_body_size 16M;
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://127.0.0.1:8000;

        # Required for FastAPI's request.url.scheme + request.url.netloc
        # to resolve to the public values (https + qr.dc.t-cloud.kz) instead
        # of the local plaintext upstream. The Dockerfile starts uvicorn with
        # --proxy-headers so these are actually trusted.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # Health endpoint accessible without proxying through any auth — used
    # by external monitors. Returns 200 OK / 503 from the FastAPI handler.
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
