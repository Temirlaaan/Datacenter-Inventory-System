# Alembic configuration. The DB URL is loaded from app.config in env.py — do not
# set sqlalchemy.url here, otherwise the wrong (placeholder) URL would win.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Format generated migrations with black + lint-fix with ruff so checked-in revisions
# match the rest of the codebase. Both run via the venv created by `uv sync`.
[post_write_hooks]
hooks = black, ruff
black.type = console_scripts
black.entrypoint = black
black.options = REVISION_SCRIPT_FILENAME
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
