<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>QR scan PoC — DC Inventory</title>
  <!--
    Throwaway proof-of-concept to validate in-browser QR scanning on the real
    target devices (esp. iOS Safari, which has no native BarcodeDetector).
    html5-qrcode wraps getUserMedia + a zxing fallback so it works cross-browser.

    Served by the backend over its existing TLS (camera REQUIRES https). Open
    this page from a personal iPhone/Android over the VPN and scan ~10 real
    DCQR- stickers, including worn / angled / dim ones.

    For the PoC the library loads from a CDN — the production SPA will bundle it
    (no CDN dependency, like the self-hosted tailwind.js). If the phone's VPN is
    full-tunnel and blocks the CDN, you'll see "library failed to load" below.
  -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #0b0b0d; color: #fafafa; min-height: 100dvh;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }
    .wrap { max-width: 480px; margin: 0 auto; padding-top: 20px; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p.sub { color: #9ca3af; font-size: 13px; margin: 0 0 16px; }
    #reader { width: 100%; border-radius: 14px; overflow: hidden; background: #111; }
    button {
      width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border: 0;
      border-radius: 12px; background: #1A57C7; color: #fff; margin-top: 14px;
      transition: transform .12s ease; -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.97); }
    button.secondary { background: #26272b; }
    .result { margin-top: 16px; padding: 14px; border-radius: 12px; border: 1px solid #2a2b2f; background: #141518; }
    .result .val { font-family: ui-monospace, Menlo, monospace; font-size: 15px; word-break: break-all; }
    .ok { color: #34d399; } .warn { color: #fbbf24; } .err { color: #f87171; }
    .log { margin-top: 12px; font-size: 12px; color: #6b7280; white-space: pre-wrap; }
    .count { font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>QR scan PoC</h1>
    <p class="sub">Проверка сканера в браузере. Нажми «Включить камеру» и наведи на наклейку DCQR-.</p>
    <div id="reader"></div>
    <button id="start">Включить камеру</button>
    <button id="stop" class="secondary" style="display:none">Остановить</button>
    <div id="result" class="result" style="display:none">
      <div>Последний код: <span id="lastval" class="val"></span></div>
      <div id="verdict" style="margin-top:6px"></div>
    </div>
    <div class="log" id="log"></div>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const log = (m) => { logEl.textContent = (m + '\n' + logEl.textContent).slice(0, 1500); };
    let scanned = 0;

    if (typeof Html5Qrcode === 'undefined') {
      logEl.innerHTML = '<span class="err">Библиотека сканера не загрузилась (проверь интернет/CDN на телефоне).</span>';
    }

    const reader = (typeof Html5Qrcode !== 'undefined') ? new Html5Qrcode('reader') : null;
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const resultEl = document.getElementById('result');
    const lastVal = document.getElementById('lastval');
    const verdict = document.getElementById('verdict');

    function onScan(text) {
      scanned += 1;
      resultEl.style.display = 'block';
      lastVal.textContent = text;
      const isDcqr = text.startsWith('DCQR-');
      verdict.innerHTML = isDcqr
        ? '<span class="ok">✓ Похоже на метку DC (' + scanned + '-е сканирование)</span>'
        : '<span class="warn">⚠ Декодировано, но без префикса DCQR- (' + scanned + ')</span>';
      if (navigator.vibrate) navigator.vibrate(40);
      log('scan #' + scanned + ': ' + text);
    }

    startBtn.addEventListener('click', async () => {
      if (!reader) return;
      try {
        await reader.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScan,
          () => {}  // per-frame decode failures are normal; ignore
        );
        startBtn.style.display = 'none';
        stopBtn.style.display = 'block';
        log('камера запущена');
      } catch (e) {
        log('ошибка запуска камеры: ' + e);
        verdict.innerHTML = '<span class="err">Камера недоступна. Нужен HTTPS + разрешение на камеру.</span>';
        resultEl.style.display = 'block';
      }
    });

    stopBtn.addEventListener('click', async () => {
      if (!reader) return;
      try { await reader.stop(); } catch (e) { log('stop: ' + e); }
      startBtn.style.display = 'block';
      stopBtn.style.display = 'none';
      log('камера остановлена');
    });
  </script>
</body>
</html>
