{% extends "_base.html" %}
{% block title %}New batch &middot; DC Inventory admin{% endblock %}
{% block content %}
<section class="bg-white rounded-lg shadow-sm ring-1 ring-gray-200 p-6 max-w-2xl">
    <a class="inline-flex items-center text-sm text-gray-500 hover:text-gray-700 mb-4" href="/web/batches/">&laquo; Back to batches</a>
    <h1 class="text-2xl font-semibold text-gray-900 mb-1">New QR batch</h1>
    <p class="text-sm text-gray-500 mb-6">Generates N free QR codes in a single batch. After creation you'll land on the batch detail page where you can download printable PDF labels.</p>

    <form method="post" action="/web/batches/" class="space-y-4">
        <input type="hidden" name="_csrf" value="{{ csrf_token }}">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Count</label>
            <input name="count" type="number" min="1" max="500" value="50" required
                   class="block w-full rounded-md border-gray-300 shadow-sm text-sm focus:border-indigo-500 focus:ring-indigo-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Comment <span class="text-gray-400 font-normal">(optional)</span></label>
            <input name="comment" type="text" maxlength="200" placeholder="e.g. tray-A initial stock"
                   class="block w-full rounded-md border-gray-300 shadow-sm text-sm focus:border-indigo-500 focus:ring-indigo-500">
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Intended site id</label>
                <input name="intended_site_id" type="number" min="1" placeholder="optional"
                       class="block w-full rounded-md border-gray-300 shadow-sm text-sm focus:border-indigo-500 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Intended location id</label>
                <input name="intended_location_id" type="number" min="1" placeholder="optional"
                       class="block w-full rounded-md border-gray-300 shadow-sm text-sm focus:border-indigo-500 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Intended rack id</label>
                <input name="intended_rack_id" type="number" min="1" placeholder="optional"
                       class="block w-full rounded-md border-gray-300 shadow-sm text-sm focus:border-indigo-500 focus:ring-indigo-500">
            </div>
        </div>
        <div class="pt-2">
            <button type="submit" class="inline-flex items-center px-4 py-2 rounded-md bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium shadow-sm">Create batch</button>
        </div>
    </form>
</section>
{% endblock %}
