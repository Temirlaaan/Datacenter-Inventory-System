<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DC Inventory admin{% endblock %}</title>
    {# Tailwind Play script, self-hosted under /static/ so the admin
       surface has no runtime dependency on cdn.tailwindcss.com. Bundled
       with the official @tailwindcss/forms plugin (gives all native
       <input>/<textarea>/<select> sane padding + border defaults out
       of the box — without it Tailwind's preflight strips browser
       styling and inputs render with zero internal padding). Pinned to
       the version we downloaded on 2026-06-07. To upgrade, re-fetch
       `https://cdn.tailwindcss.com?plugins=forms`. Precompile to a CSS
       bundle (needs Node) only if the ~400KB JS load becomes a perf
       concern. #}
    <script src="/static/tailwind.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'system-ui', 'sans-serif'],
              mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col">

<header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center h-14 gap-8">
        <a class="text-sm font-semibold text-gray-900 tracking-tight whitespace-nowrap" href="/web/">DC Inventory</a>
        <nav class="flex items-center gap-1 flex-1 overflow-x-auto">
            {% set _navlink = "px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 whitespace-nowrap" %}
            <a class="{{ _navlink }}" href="/web/">Dashboard</a>
            <a class="{{ _navlink }}" href="/web/batches/">Batches</a>
            <a class="{{ _navlink }}" href="/web/qr/search">QR search</a>
            <a class="{{ _navlink }}" href="/web/audit/">Audit</a>
            <a class="{{ _navlink }}" href="/web/sessions/">Sessions</a>
            <a class="{{ _navlink }}" href="/web/users/">Users</a>
        </nav>
        <div class="flex items-center gap-3 text-sm">
            {% if user_email %}<span class="text-gray-500 hidden sm:inline">{{ user_email }}</span>{% endif %}
            <a class="px-3 py-1.5 rounded-md text-sm font-medium border border-gray-200 text-gray-700 hover:bg-gray-100" href="/web/logout">Log out</a>
        </div>
    </div>
</header>

{% if flash %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6">
    {% if flash_kind == "error" %}
    <div class="rounded-md border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800">{{ flash }}</div>
    {% else %}
    <div class="rounded-md border border-indigo-200 bg-indigo-50 px-4 py-3 text-sm text-indigo-800">{{ flash }}</div>
    {% endif %}
</div>
{% endif %}

<main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
</main>

<footer class="border-t border-gray-200 py-6 text-center text-xs text-gray-500">
    DC Inventory backend &middot;
    <a class="hover:text-gray-700" href="/health">/health</a> &middot;
    <a class="hover:text-gray-700" href="/docs">/docs</a>
</footer>
</body>
</html>
