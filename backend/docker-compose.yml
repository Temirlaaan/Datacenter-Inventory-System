# Production stack for the DC Inventory backend.
#
# Local dev: copy .env.example to .env, fill in values, then `docker compose up -d`.
# `docker compose down` keeps the DB volume; `docker compose down -v` wipes it.
#
# Note: the test DB stack lives in docker-compose.test.yml (port 5433, tmpfs storage).

services:
  dcinv-db:
    image: postgres:15
    container_name: dcinv-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dcinv}
      POSTGRES_USER: ${POSTGRES_USER:-dcinv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - dcinv-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dcinv} -d ${POSTGRES_DB:-dcinv}"]
      interval: 2s
      timeout: 3s
      retries: 15

  dcinv-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dcinv-backend
    restart: unless-stopped
    depends_on:
      dcinv-db:
        condition: service_healthy
    # ``env_file`` carries every variable from .env into the container so
    # newer Settings fields (Sprint 7+ SHIFT_AUTO_END_*, Sprint 8a
    # NETBOX_CIRCUIT_* / RATE_LIMIT_*, Sprint 8b KEYCLOAK_WEB_CLIENT_* /
    # SESSION_COOKIE_KEY / COOKIE_SECURE) don't need explicit enumeration
    # here. Anything explicitly listed under ``environment:`` below
    # overrides .env — used for required-var validation + assembling
    # DATABASE_URL from the POSTGRES_* parts.
    env_file: .env
    environment:
      # Required vars: ``${VAR:?...}`` fails at compose-up if unset, before
      # the container even starts. Catches missing env earlier than the
      # Pydantic Settings validator.
      NETBOX_URL: ${NETBOX_URL:?NETBOX_URL is required}
      NETBOX_SERVICE_TOKEN: ${NETBOX_SERVICE_TOKEN:?NETBOX_SERVICE_TOKEN is required}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:?KEYCLOAK_BASE_URL is required}
      KEYCLOAK_WEB_CLIENT_SECRET: ${KEYCLOAK_WEB_CLIENT_SECRET:?KEYCLOAK_WEB_CLIENT_SECRET is required}
      SESSION_COOKIE_KEY: ${SESSION_COOKIE_KEY:?SESSION_COOKIE_KEY is required (generate via cryptography.fernet.Fernet.generate_key())}
      # DATABASE_URL is assembled from POSTGRES_* so it stays in sync with
      # the dcinv-db service env above.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dcinv}:${POSTGRES_PASSWORD}@dcinv-db:5432/${POSTGRES_DB:-dcinv}
    ports:
      - "8000:8000"
    healthcheck:
      # /health returns 503 if any downstream is unreachable. NetBox/Keycloak must be
      # reachable from inside this container for the stack to settle into "healthy".
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=2).status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  dcinv-db-data:
